<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 7 - THE VOID</title>
    <style>
        /* Base Reset & Retro Fonts */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #05010a;
            color: #00ff66;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* CRT Screen Effects */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Vignette & Color Distortion */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(15, 0, 20, 0.8) 100%);
            z-index: 100;
            pointer-events: none;
        }

        /* Header / Logo Area */
        header {
            text-align: center;
            padding: 20px;
            background: rgba(10, 2, 15, 0.8);
            border-bottom: 3px double #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .station-logo {
            max-width: 100%;
            width: 598px;
            height: auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.6));
            animation: glitch 4s infinite;
        }

        /* Main Broadcast Monitor */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 20px;
        }

        .monitor-frame {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background-color: #11001c;
            border: 10px solid #221133;
            border-radius: 20px;
            position: relative;
            box-shadow: inset 0 0 40px #000, 0 0 30px rgba(255, 0, 85, 0.2);
            overflow: hidden;
        }

        /* Interactive Static/Signal */
        .broadcast-screen {
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_flicker2.gif');
            background-size: cover;
            opacity: 0.15;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            mix-blend-mode: color-dodge;
        }

        .emergency-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            width: 80%;
        }

        .alert-text {
            color: #ff0055;
            font-size: 3rem;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055;
            animation: blink 1s infinite alternate;
        }

        .sub-text {
            color: #00ffff;
            font-size: 1.8rem;
            margin-top: 15px;
            text-shadow: 0 0 5px #00ffff;
        }

        /* Navigation / Control Panel */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(5, 1, 10, 0.9);
            border-top: 2px dashed #00ffff;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ff66;
            color: #00ff66;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            padding: 5px 15px;
            cursor: pointer;
            text-shadow: 0 0 3px #00ff66;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #00ff66;
            color: #05010a;
            box-shadow: 0 0 15px #00ff66;
        }

        /* Live Ticker Footer */
        footer {
            background: #11001c;
            overflow: hidden;
            white-space: nowrap;
            padding: 5px 0;
            border-top: 1px solid #ff0055;
        }

        .ticker {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-move 25s linear infinite;
            color: #ffcc00;
            text-shadow: 0 0 5px #ffcc00;
        }

        /* Animations */
        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0.1; }
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes glitch {
            0% { transform: translate(0) skew(0deg); }
            2% { transform: translate(-2px, 2px) skew(-4deg); filter: hue-rotate(90deg); }
            4% { transform: translate(2px, -1px) skew(8deg); }
            6% { transform: translate(0) skew(0deg); }
            100% { transform: translate(0) skew(0deg); }
        }
    </style>
</head>
<body>

    <header>
        <img src="YOUR_IMAGE_URL_HERE" alt="CHANNEL 7 LOGO" class="station-logo">
    </header>

    <main>
        <div class="monitor-frame">
            <div class="broadcast-screen"></div>
            
            <div class="emergency-alert">
                <div class="alert-text">⚠️ SIGNAL INTERRUPTED ⚠️</div>
                <div class="sub-text">DO NOT LOOK AT THE NIGHT SKY.<br>STAY INDOORS.</div>
            </div>
        </div>
    </main>

    <nav>
        <button class="btn" onclick="changeChannel()">TUNE CHANNEL</button>
        <button class="btn" onclick="toggleAudio()">AUDIO LOGS</button>
        <button class="btn" onclick="alert('ARCHIVE CORRUPTED')">ARCHIVES</button>
    </nav>

    <footer>
        <div class="ticker">
            LOCAL WEATHER: UNNATURAL FOG APPROACHING COUNTY LINES... COUNTDOWN TO MIDNIGHT BROADCAST HAS BEGUN... IF YOU HEAR THE WHISPERING, IT IS ALREADY TOO LATE...
        </div>
    </footer>

    <script>
        // Simple interactive scripts for creepy immersion
        function changeChannel() {
            const screen = document.querySelector('.broadcast-screen');
            const alertText = document.querySelector('.alert-text');
            const subText = document.querySelector('.sub-text');
            
            // Temporary static flash
            screen.style.opacity = "0.8";
            
            setTimeout(() => {
                screen.style.opacity = "0.15";
                alertText.innerHTML = "❌ NO SIGNAL DETECTED ❌";
                subText.innerHTML = "THEY ARE WATCHING BACK.";
                subText.style.color = "#ff0055";
            }, 300);
        }

        function toggleAudio() {
            // Fakes a creepy synth beep/frequency
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(120, audioCtx.currentTime); // Low creepy hum
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.5);
        }
    </script>
</body>
</html>
