<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 7 - THE CHANGER OF WAYS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 12 12"><path d="M6 0L9 4L6 12L3 4Z" fill="%2300ffff"/></svg>'), auto;
        }

        body {
            background-color: #010008;
            color: #00ffff;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            letter-spacing: 1px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 480p Monitor warped by Tzeentchian energy */
        .crt-monitor {
            position: relative;
            width: 100vh;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            background-color: #03010c;
            border: 16px solid #100b1a;
            border-radius: 30px;
            box-shadow: 
                inset 0 0 80px rgba(0, 0, 0, 1),
                0 0 60px rgba(255, 0, 170, 0.25),
                0 0 120px rgba(0, 255, 255, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.1s ease;
        }

        /* Scanlines + Fluctuating Iridescent Warp Overlay */
        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%),
                linear-gradient(90deg, rgba(255, 0, 128, 0.06), rgba(0, 255, 255, 0.04), rgba(255, 200, 0, 0.04));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Curved Glass Screen Filter */
        .crt-monitor::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(5, 0, 15, 0.95) 110%);
            z-index: 11;
            pointer-events: none;
        }

        /* Constant Cosmic Static */
        .vhs-static {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_flicker2.gif');
            background-size: cover;
            opacity: 0.14;
            z-index: 5;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        /* Shifting Horizontal Distortion Rift */
        .warp-rift {
            position: absolute;
            left: 0; width: 100%; height: 35px;
            background: linear-gradient(transparent, rgba(0, 255, 255, 0.2), transparent);
            filter: blur(6px);
            z-index: 6;
            animation: rift-drift 6s ease-in-out infinite;
            pointer-events: none;
        }

        /* Screen Content Layout */
        .screen-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            z-index: 2;
        }

        header {
            text-align: center;
            border-bottom: 2px solid #ff00aa;
            padding-bottom: 8px;
        }

        .station-logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            /* Tzeentch Tones: Pink, Cyan, Violet, Gold shifting chromatic aberration */
            animation: mutate-fringe 4s infinite linear;
        }

        .vhs-metadata {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: #ffcc00;
            text-shadow: 0 0 6px #ffcc00;
            margin-top: 5px;
        }

        /* Information & Mutation Display */
        .feed-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px 0;
        }

        .alert-banner {
            background: #ff00aa;
            color: #010008;
            font-weight: bold;
            padding: 2px 14px;
            font-size: 1.5rem;
            margin-bottom: 12px;
            box-shadow: 0 0 15px #ff00aa;
            animation: reality-flicker 0.3s infinite alternate;
        }

        .terminal-text {
            color: #00ffaa;
            font-size: 1.35rem;
            text-shadow: 0 0 5px rgba(0,255,170,0.4);
            line-height: 1.4;
            max-width: 90%;
            min-height: 80px;
        }

        /* Interactive Options */
        .console-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px dashed #ff00aa;
            padding-top: 15px;
        }

        .btn {
            background: rgba(255, 0, 170, 0.05);
            border: 1px solid #ff00aa;
            color: #ff00aa;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 6px;
            text-transform: uppercase;
            box-shadow: inset 0 0 5px rgba(255,0,170,0.1);
            transition: all 0.1s ease;
        }

        .btn:hover {
            background: #00ffff;
            color: #010008;
            border-color: #00ffff;
            box-shadow: 0 0 15px #00ffff;
        }

        /* Secret Watcher Overlay */
        .tzeentch-eye-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(3,1,12,0.95) 20%, #010008 100%);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lord-of-change-eye {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #010008 15%, #00ffff 35%, #ff00aa 60%, transparent 75%);
            border-radius: 50%;
            transform: rotate(45deg);
            animation: cosmic-gaze 0.1s infinite alternate;
            box-shadow: 0 0 30px #00ffff;
        }

        .whisper-caption {
            margin-top: 20px;
            color: #ffcc00;
            font-size: 1.6rem;
            animation: violent-blink 0.2s infinite;
        }

        /* Horror/Warp Keyframes */
        @keyframes rift-drift {
            0% { top: -40px; }
            50% { filter: hue-rotate(180deg); }
            100% { top: 100%; }
        }

        @keyframes reality-flicker {
            0% { opacity: 1; filter: hue-rotate(0deg); }
            50% { opacity: 0.9; }
            100% { opacity: 0.4; filter: hue-rotate(90deg); }
        }

        @keyframes mutate-fringe {
            0% { filter: drop-shadow(3px 0px 0px #ff00aa) drop-shadow(-3px 0px 0px #00ffff); }
            33% { filter: drop-shadow(-2px 2px 0px #ffcc00) drop-shadow(2px -2px 0px #ff00aa); transform: scale(1.01) skewX(1deg); }
            66% { filter: drop-shadow(2px -2px 0px #00ffff) drop-shadow(-2px 2px 0px #ffcc00); transform: scale(0.99) skewY(-1deg); }
            100% { filter: drop-shadow(3px 0px 0px #ff00aa) drop-shadow(-3px 0px 0px #00ffff); }
        }

        @keyframes cosmic-gaze {
            0% { transform: scale(1) rotate(43deg); filter: saturate(1.5); }
            100% { transform: scale(1.1) rotate(47deg); filter: saturate(3); }
        }
    </style>
</head>
<body>

    <div class="crt-monitor" id="monitor">
        <div class="vhs-static"></div>
        <div class="warp-rift"></div>
        
        <!-- The All-Seeing Eye of Mutation -->
        <div class="tzeentch-eye-overlay" id="gaze-lock">
            <div class="lord-of-change-eye"></div>
            <div class="whisper-caption">ALL ARCHIVES REWRITE THEMSELVES</div>
        </div>

        <div class="screen-content">
            <header>
                <!-- Keep your generated image URL here -->
                <img src="YOUR_IMAGE_URL_HERE" alt="CHANNEL 7" class="station-logo">
                <div class="vhs-metadata">
                    <span>MUTATION RATE: 99.8%</span>
                    <span id="vhs-counter">INDEX: 0000</span>
                </div>
            </header>

            <div class="feed-container">
                <div class="alert-banner" id="warp-status">THE MAZE UNFOLDS</div>
                <div class="terminal-text" id="manifesto">
                    REALITY IS RE-MANUFACTURING.<br>
                    IF THE SCHEMATIC IN YOUR TELEVISION MATCHES YOUR HOME FLOORPLAN, CHOOSE A NEW ARCHITECTURE.
                </div>
            </div>

            <div class="console-controls">
                <button class="btn" onclick="alterDestiny()">MUTATE TIMELINE</button>
                <button class="btn" onclick="readScroll()">STUDY THE MAZE</button>
            </div>
        </div>
    </div>

    <script>
        // Increasing warp numerical counter
        let counter = 777;
        setInterval(() => {
            counter += Math.floor(Math.random() * 9) + 1;
            document.getElementById('vhs-counter').innerText = "INDEX: " + String(counter).padStart(4, '0');
            
            // Random micro-tremor in the monitor to simulate warp distortion
            if (Math.random() < 0.15) {
                const monitor = document.getElementById('monitor');
                monitor.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
                setTimeout(() => monitor.style.transform = 'none', 50);
            }
        }, 800);

        // Tzeentchian paradoxical logs
        const tzeentchLogs = [
            "YOU HAVE ALWAYS LIVED INSIDE THE CATACLYSM. THE BEFORE WAS A DREAM.",
            "THE ARCHIVES ARE NOT RECORDING THE PAST. THEY ARE SCRIPTING YOUR TOMORROW.",
            "DO NOT TRUST THE GEOMETRY OF YOUR ROOMS. THE ANGLES ARE SHIFTING.",
            "NINE IS THE NUMBER. NINE IS THE SECONDS REMAINING IN YOUR DESIGNATION."
        ];
        let currentScroll = 0;

        function readScroll() {
            triggerSorcerousTone(294, 381, 'sawtooth', 0.2); // Dissonant dual frequency
            document.getElementById('manifesto').innerHTML = "MUTATING LINGUISTIC STRUCTURES...";
            
            setTimeout(() => {
                document.getElementById('manifesto').innerHTML = tzeentchLogs[currentScroll];
                currentScroll = (currentScroll + 1) % tzeentchLogs.length;
            }, 500);
        }

        // Altering Destiny sparks visual chaos and potential mind-lock
        function alterDestiny() {
            triggerSorcerousTone(99, 111, 'triangle', 0.6);
            
            const banner = document.getElementById('warp-status');
            banner.innerText = "CRITICAL: CHANGER OF WAYS AT HAND";
            banner.style.background = "#ffcc00";
            banner.style.color = "#010008";
            
            document.getElementById('manifesto').innerHTML = "THE ARCH-ARCHITECT ACKNOWLEDGES YOUR CURIOSITY.";

            // High probability warp event (Tzeentch loves tricks)
            if(Math.random() < 0.45) {
                setTimeout(() => {
                    const gaze = document.getElementById('gaze-lock');
                    gaze.style.display = 'flex';
                    triggerSorcerousTone(880, 932, 'square', 0.3); // High-pitched piercing noise
                    
                    setTimeout(() => {
                        gaze.style.display = 'none';
                        // Re-scramble the status text completely as a side effect
                        banner.innerText = "RE-REALITY LEVEL: CHOSEN";
                        banner.style.background = "#00ffaa";
                    }, 400);
                }, 1000);
            }
        }

        // Advanced Synth Audio to emulate Chaos Warp Frequencies
        function triggerSorcerousTone(f1, f2, type, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Two oscillators interlock to form an uncomfortable chord
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc1.type = type;
                osc1.frequency.setValueAtTime(f1, audioCtx.currentTime);
                
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(f2, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc1.start();
                osc2.start();
                
                osc1.stop(audioCtx.currentTime + duration);
                osc2.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
    </script>
</body>
</html>
