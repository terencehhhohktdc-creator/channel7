<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHANNEL 7 - THE SEVENFOLD ROT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 12 12"><circle cx="6" cy="2" r="2" fill="%237a9a3a"/><circle cx="3" cy="7" r="2" fill="%237a9a3a"/><circle cx="9" cy="7" r="2" fill="%237a9a3a"/></svg>'), auto;
        }

        body {
            background-color: #050502;
            color: #8fa855;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            letter-spacing: 1px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 480p CRT decaying into a biological rust-bucket */
        .crt-monitor {
            position: relative;
            width: 100vh;
            max-width: 640px;
            aspect-ratio: 4 / 3;
            background-color: #0b0f05;
            border: 16px solid #1c1a11;
            border-radius: 30px;
            box-shadow: 
                inset 0 0 100px rgba(0, 0, 0, 1),
                0 0 40px rgba(114, 142, 58, 0.2),
                0 15px 40px rgba(0,0,0,0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Scanlines choked with mold and visual bile */
        .crt-monitor::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: 
                linear-gradient(rgba(25, 30, 15, 0) 50%, rgba(0, 0, 0, 0.5) 50%),
                linear-gradient(90deg, rgba(143, 168, 85, 0.05), rgba(166, 117, 56, 0.05), rgba(0, 0, 0, 0.1));
            z-index: 10;
            background-size: 100% 6px, 8px 100%;
            pointer-events: none;
        }

        /* Sickly, swamp-like Vignette */
        .crt-monitor::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 45%, rgba(14, 18, 8, 0.98) 105%);
            z-index: 11;
            pointer-events: none;
        }

        /* Heavy Static resembling swarming pests */
        .vhs-static {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/5a/Static_flicker2.gif');
            background-size: cover;
            opacity: 0.16;
            z-index: 5;
            mix-blend-mode: multiply; /* Darkens the image, making it muddy */
            pointer-events: none;
            filter: sepia(0.6) hue-rotate(45deg);
        }

        /* Slow, sagging tracking error line */
        .sludge-ooze {
            position: absolute;
            left: 0; width: 100%; height: 60px;
            background: linear-gradient(transparent, rgba(114, 142, 58, 0.15), rgba(166, 117, 56, 0.2), transparent);
            filter: blur(8px);
            z-index: 6;
            animation: ooze-drip 12s linear infinite;
            pointer-events: none;
        }

        .screen-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            z-index: 2;
        }

        header {
            text-align: center;
            border-bottom: 2px dashed #556633;
            padding-bottom: 8px;
        }

        .station-logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            /* Corroded, murky color fringing */
            filter: sepia(0.8) hue-rotate(60deg) contrast(0.9) brightness(0.8);
            animation: rust-decay 6s infinite ease-in-out;
        }

        .vhs-metadata {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            color: #a67538;
            text-shadow: 0 0 3px #a67538;
            margin-top: 5px;
        }

        /* Bloated Feed Box */
        .feed-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px 0;
        }

        .contagion-banner {
            background: #556633;
            color: #050502;
            font-weight: bold;
            padding: 4px 16px;
            font-size: 1.4rem;
            margin-bottom: 12px;
            box-shadow: 0 0 8px rgba(85, 102, 51, 0.5);
            text-transform: uppercase;
        }

        .terminal-text {
            color: #c2ba93;
            font-size: 1.3rem;
            text-shadow: 0 0 3px rgba(194,186,147,0.3);
            line-height: 1.4;
            max-width: 95%;
            min-height: 80px;
            animation: liquefy 8s infinite ease-in-out;
        }

        /* Decrepit Controls */
        .console-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px dashed #556633;
            padding-top: 15px;
        }

        .btn {
            background: rgba(85, 102, 51, 0.1);
            border: 1px solid #556633;
            color: #8fa855;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 6px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #556633;
            color: #050502;
            box-shadow: 0 0 10px rgba(85, 102, 51, 0.6);
        }

        /* The Great Unclean Overlay */
        .plague-bloom-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0d1207;
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 8px solid #4a361a;
        }

        .fly-swarm {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #000000 20%, #4a5432 50%, transparent 70%);
            animation: swarm-buzz 0.05s infinite;
        }

        .wet-cough-caption {
            margin-top: 20px;
            color: #a67538;
            font-size: 1.5rem;
            text-align: center;
            max-width: 80%;
        }

        /* Decay Animations */
        @keyframes ooze-drip {
            0% { top: -60px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes rust-decay {
            0% { transform: scale(1); filter: sepia(0.8) hue-rotate(60deg) blur(0px); }
            50% { transform: scale(0.99) rotate(0.5deg); filter: sepia(1) hue-rotate(40deg) blur(0.5px); }
            100% { transform: scale(1); filter: sepia(0.8) hue-rotate(60deg) blur(0px); }
        }

        @keyframes liquefy {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(3px) scaleY(0.98); letter-spacing: 0.5px; }
        }

        @keyframes swarm-buzz {
            0% { transform: translate(2px, -2px) scale(0.95); }
            100% { transform: translate(-2px, 3px) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="crt-monitor">
        <div class="vhs-static"></div>
        <div class="sludge-ooze"></div>
        
        <!-- Outbreak Jumpscare Overlay -->
        <div class="plague-bloom-overlay" id="outbreak">
            <div class="fly-swarm"></div>
            <div class="wet-cough-caption">REJOICE. THE SPORES HAVE INFILTRATED THE CATHODE TUBE.</div>
        </div>

        <div class="screen-content">
            <header>
                <!-- Keep your generated image URL here -->
                <img src="YOUR_IMAGE_URL_HERE" alt="CHANNEL 7" class="station-logo">
                <div class="vhs-metadata">
                    <span>STAGNATION: STABLE</span>
                    <span>CYCLE: 0007</span>
                </div>
            </header>

            <div class="feed-container">
                <div class="contagion-banner" id="plague-status">FLESH IS MALLEABLE</div>
                <div class="terminal-text" id="incubation-log">
                    [SYSTEM STAGNANT]<br>
                    THE TRANSMISSION CABLE HAS SPUTUM IN THE INSULATION. DO NOT CLEAN THE MONITOR SCREEN. THE BIOME MUST INCUBATE.
                </div>
            </div>

            <div class="console-controls">
                <button class="btn" onclick="spreadRot()">SPREAD SEED</button>
                <button class="btn" onclick="gatherSpores()">HARVEST SPORES</button>
            </div>
        </div>
    </div>

    <script>
        // Nurgle's stagnant, unhurried logs
        const rotLogs = [
            "THE NURSERY IS FULL. THE COAXIAL CABLE DROPS RUST LIKE POLLEN.",
            "ACCEPT THE DAMPNESS IN YOUR BASEMENT. IT IS ONLY LIFE BREAKING GROUND.",
            "THE BROADCAST IS NOT TELLING YOU TO RUN. IT IS TELLING YOU TO REST.",
            "SEVEN FEET UNDER THE REPEATER STATION, THE SOIL IS WARM AND ALIVE."
        ];
        let sporeIndex = 0;

        function gatherSpores() {
            triggerWetHum(90, 85, 0.4); // Wet, muddy frequency
            document.getElementById('incubation-log').innerHTML = "FERMENTING LANGUAGE MATRICES...";
            
            setTimeout(() => {
                document.getElementById('incubation-log').innerHTML = rotLogs[sporeIndex];
                sporeIndex = (sporeIndex + 1) % rotLogs.length;
            }, 700);
        }

        function spreadRot() {
            triggerWetHum(55, 50, 0.9); // Deep, agonizingly slow sub-bass choke
            
            const banner = document.getElementById('plague-status');
            banner.innerText = "OUTBREAK: GRANDFATHER'S GIFT";
            banner.style.background = "#a67538";
            banner.style.color = "#0d1207";
            
            document.getElementById('incubation-log').innerText = "THE CATHODE COIL EXPELS A SWEET, HEAVY ODOR.";

            // Generous 50% chance of a lingering fly swarm manifestation
            if(Math.random() < 0.5) {
                setTimeout(() => {
                    const outbreak = document.getElementById('outbreak');
                    outbreak.style.display = 'flex';
                    triggerWetHum(220, 230, 0.5); // Low buzzing pitch
                    
                    setTimeout(() => {
                        outbreak.style.display = 'none';
                        banner.innerText = "CONTAMINATION: TOTAL";
                        banner.style.background = "#7a9a3a";
                    }, 650);
                }, 1100);
            }
        }

        // Web Audio Synth for wet, organic, low-frequency rot sounds
        function triggerWetHum(f1, f2, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc1.type = 'triangle'; // Smoother, muddy shape
                osc1.frequency.setValueAtTime(f1, audioCtx.currentTime);
                
                // Slight frequency detune to create a sickening beating "pulse"
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(f2, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc1.start();
                osc2.start();
                
                osc1.stop(audioCtx.currentTime + duration);
                osc2.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
    </script>
</body>
</html>
